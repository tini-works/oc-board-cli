title: User Onboarding
description: Complete onboarding from signup to first project
tags: [flow, onboarding, auth]
status: stable
category: flows
order: 1

steps:
  - id: signup
    title: Create Account
    description: Enter your details to get started
    screen: signup

  - id: welcome
    title: Welcome to Workflow
    description: Account created successfully
    screen: signup
    state: success

  - id: invite
    title: Invite Your Team
    description: Add team members to collaborate
    screen: team
    state: inviting

  - id: first-project
    title: Create First Project
    description: Set up your first project board
    screen: project-board
    state: empty

  - id: dashboard
    title: You're All Set
    description: Your workspace is ready
    screen: dashboard

transitions:
  - from: signup
    to: welcome
    trigger: submit_form

  - from: welcome
    to: invite
    trigger: click_continue

  - from: invite
    to: first-project
    trigger: skip_or_send

  - from: first-project
    to: dashboard
    trigger: create_project
